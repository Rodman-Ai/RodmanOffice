name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/plan-office-suite-570m3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Opt into Node 24 for all third-party JS actions (silences the
# Node 20 deprecation warning emitted by the runner).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: sheets/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: sheets/pnpm-lock.yaml

      - name: Cache npm (LeoCRM)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('crm/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install LeoCRM dependencies
        working-directory: crm
        run: npm ci

      - name: Install AiCell dependencies
        working-directory: sheets
        run: pnpm install --frozen-lockfile

      - name: Build LeoCRM static demo
        working-directory: crm
        env:
          NEXT_PUBLIC_BASE_PATH: /RodmanOffice/crm
        run: bash scripts/build-demo.sh

      - name: Build AiCell web app
        working-directory: sheets
        env:
          VITE_BASE: /RodmanOffice/sheets/
          VITE_API_BASE: ""
        run: pnpm --filter @aicell/web build

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='crm' \
            --exclude='sheets' \
            ./ _site/
          cp -r crm/out _site/crm
          cp -r sheets/apps/web/dist _site/sheets

      - name: Setup Pages
        uses: actions/configure-pages@v5
        # Force Pages source = "GitHub Actions" on every run. If the
        # site was created with "Deploy from a branch", this flips it
        # so the workflow's _site artifact is what actually gets served
        # — without this, /crm/ and /sheets/ 404 because the source
        # tree has no index.html at those slug roots.
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    # Only deploy from main — feature branches still build (so we know
    # CI passes pre-merge), but skip the deploy step to avoid the
    # github-pages environment protection rule rejecting them.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
